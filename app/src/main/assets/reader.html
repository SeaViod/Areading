<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Serif SC","STSong","SimSun",serif;background:#f8f6f0;color:#2c2c2c;height:100vh;display:flex}
.sidebar{width:260px;min-width:260px;background:#f2efe8;border-right:1px solid #e0d8cc;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.sidebar h2{font-size:16px;color:#8b5a2b;padding:16px;border-bottom:1px solid #e0d8cc}
.search{padding:8px 12px;border-bottom:1px solid #e0d8cc}
.search input{width:100%;padding:8px;border:1px solid #e0d8cc;border-radius:6px;font-size:13px;outline:none;font-family:inherit}
.list{flex:1;overflow-y:auto}
.item{padding:10px 16px;font-size:14px;cursor:pointer;border-left:3px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .15s}
.item:hover,.item:active{background:#e8e0d4}
.item.active{background:#fff;border-left-color:#8b5a2b;font-weight:bold;color:#8b5a2b}
.main{flex:1;display:flex;flex-direction:column;height:100vh}
.toolbar{display:flex;align-items:center;padding:10px 20px;background:#fffcf7;border-bottom:1px solid #e0d8cc;gap:8px;flex-shrink:0}
.toolbar .ttl{flex:1;font-size:15px;font-weight:bold;color:#8b5a2b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toolbar button{padding:6px 14px;border:1px solid #e0d8cc;border-radius:6px;background:#fff;font-size:13px;font-family:inherit}
.content{flex:1;overflow-y:auto;padding:24px 32px 64px;background:#fffcf7}
.content p{font-size:18px;line-height:2;text-indent:2em;margin-bottom:.4em;text-align:justify}
.loading{display:flex;align-items:center;justify-content:center;height:100vh;width:100%;font-size:16px;color:#999}
@media(max-width:600px){
.sidebar{position:fixed;left:-260px;z-index:99;transition:left .3s;box-shadow:2px 0 12px rgba(0,0,0,.1)}
.sidebar.open{left:0}
.content{padding:16px 14px 48px}
.toolbar{padding:8px 12px}
}
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
<h2>📚 目录</h2>
<div class="search"><input id="search" placeholder="搜索章节…" oninput="filter()"></div>
<div class="list" id="list"></div>
</div>
<div class="main">
<button style="position:fixed;top:8px;left:8px;z-index:100;padding:8px 12px;background:#8b5a2b;color:#fff;border:none;border-radius:6px;font-size:18px;display:none" id="menuBtn" onclick="toggleSidebar()">☰</button>
<div class="toolbar">
<button id="prevBtn" onclick="go(-1)">← 上一章</button>
<span class="ttl" id="curTitle">加载中…</span>
<button id="nextBtn" onclick="go(1)">下一章 →</button>
<button onclick="changeFs(-1)">A−</button>
<button onclick="changeFs(1)">A+</button>
</div>
<div class="content" id="content"><div class="loading">正在载入…</div></div>
</div>
<script>
var DATA=[],curr=0,fsize=18;
function onDataReady(){
 DATA=window.ANDROID_CHAPTERS_DATA.chapters;
 renderList();
 var s=localStorage.getItem('gr_prog');
 selectChapter(s?parseInt(s):0);
}
function renderList(){
 var l=document.getElementById('list'),h='';
 DATA.forEach(function(c,i){h+='<div class=item data-i='+i+' onclick=sel('+i+')>'+c.title+'</div>'});
 l.innerHTML=h;
}
function selectChapter(i){
 if(i<0||i>=DATA.length)return;curr=i;var c=DATA[i];
 document.getElementById('curTitle').textContent=c.title;
 var ps=c.content.split('\n').filter(function(l){return l.trim()});
 var h='';ps.forEach(function(p){h+='<p>'+p+'</p>'});
 document.getElementById('content').innerHTML=h;
 document.getElementById('content').scrollTop=0;
 var items=document.querySelectorAll('.item');
 items.forEach(function(el){el.classList.remove('active')});
 if(items[i]){items[i].classList.add('active');items[i].scrollIntoView({block:'nearest'})}
 document.getElementById('prevBtn').disabled=i==0;
 document.getElementById('nextBtn').disabled=i==DATA.length-1;
 localStorage.setItem('gr_prog',i);
}
function sel(i){selectChapter(i);document.getElementById('sidebar').classList.remove('open')}
function go(d){selectChapter(curr+d)}
function filter(){
 var q=document.getElementById('search').value.trim();
 document.querySelectorAll('.item').forEach(function(el){
  el.style.display=q?el.textContent.includes(q)?'':'none':'';
 });
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}
function changeFs(d){fsize=Math.min(32,Math.max(12,fsize+d));document.querySelector('.content').style.fontSize=fsize+'px';localStorage.setItem('gr_fs',fsize)}
(function(){
 var s=localStorage.getItem('gr_fs');if(s)fsize=parseInt(s);
 document.addEventListener('keydown',function(e){if(e.key=='ArrowLeft')go(-1);if(e.key=='ArrowRight')go(1)});
 var mq=window.matchMedia('(max-width:600px)');
 if(mq.matches)document.getElementById('menuBtn').style.display='block';
 if(window.ANDROID_CHAPTERS_DATA)onDataReady();
})();
</script>
</body>
</html>
